<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OfferCity – Smart Nearby Offers & Deals</title>
    <style>
      #boot-loader {
        position: fixed; inset: 0; background: #fff8f5;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 14px;
        z-index: 9999;
      }
      #boot-loader .logo { font-size: 38px; }
      #boot-loader .name { font-size: 20px; font-weight: 800; color: #e65100; letter-spacing: -0.5px; }
      #boot-loader .spin {
        width: 32px; height: 32px;
        border: 3px solid #f0e6d6; border-top-color: #e65100;
        border-radius: 50%; animation: bl-spin 0.8s linear infinite;
      }
      @keyframes bl-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="boot-loader">
      <div class="logo">🏪</div>
      <div class="name">OfferCity</div>
      <div class="spin"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Remove the boot loader once React has mounted
      document.addEventListener('DOMContentLoaded', function() {
        var root = document.getElementById('root');
        var loader = document.getElementById('boot-loader');
        if (!root || !loader) return;
        var obs = new MutationObserver(function() {
          if (root.children.length > 0) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.3s';
            setTimeout(function() { loader.remove(); }, 300);
            obs.disconnect();
          }
        });
        obs.observe(root, { childList: true });
      });
    </script>
  </body>
</html>
