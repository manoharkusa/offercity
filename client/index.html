<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OfferCity – Smart Nearby Offers & Deals</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://api.fontshare.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link href="https://api.fontshare.com/v2/css?f[]=clash-display@600,700&display=swap" rel="stylesheet" />
    <style>
      #boot-loader {
        position: fixed; inset: 0; background: #FAF7F2;
        display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 16px;
        z-index: 9999;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      }
      #boot-loader .logo {
        width: 52px; height: 52px; border-radius: 15px;
        background: linear-gradient(135deg, #E85D04, #C2410C);
        display: flex; align-items: center; justify-content: center; font-size: 26px;
        box-shadow: 0 8px 24px rgba(232,93,4,.3);
      }
      #boot-loader .name { font-size: 22px; font-weight: 800; color: #1C1714; letter-spacing: -0.5px; }
      #boot-loader .spin {
        width: 30px; height: 30px;
        border: 3px solid #ECE5DB; border-top-color: #E85D04;
        border-radius: 50%; animation: bl-spin 0.8s linear infinite;
      }
      @keyframes bl-spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="boot-loader">
      <div class="logo">🔥</div>
      <div class="name">OfferCity</div>
      <div class="spin"></div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Remove the boot loader once React has mounted
      document.addEventListener('DOMContentLoaded', function() {
        var root = document.getElementById('root');
        var loader = document.getElementById('boot-loader');
        if (!root || !loader) return;
        var obs = new MutationObserver(function() {
          if (root.children.length > 0) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.3s';
            setTimeout(function() { loader.remove(); }, 300);
            obs.disconnect();
          }
        });
        obs.observe(root, { childList: true });
      });
    </script>
  </body>
</html>
