name: Migrate BigRock MySQL to EC2

on:
  workflow_dispatch:
  push:
    branches: [migrate-db]

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Write BigRock SSH key
        env:
          SSH_CI_KEY: ${{ secrets.SSH_CI_KEY }}
        run: |
          printf '%s\n' "$SSH_CI_KEY" > /tmp/br_key
          chmod 600 /tmp/br_key
          head -1 /tmp/br_key

      - name: Install paramiko
        run: pip install -q paramiko

      - name: Dump BigRock MySQL
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: python .github/scripts/dump_bigrock_db.py

      - name: Show dump stats
        run: |
          wc -l /tmp/bigrock_dump.sql
          grep "^INSERT INTO" /tmp/bigrock_dump.sql | sed "s/INSERT INTO \`\([^']*\)\`.*/\1/" | sort | uniq -c | sort -rn

      - name: Import dump into EC2
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
        run: |
          echo "Sending dump to EC2..."
          HTTP=$(curl -s -o /tmp/import_resp.txt -w "%{http_code}" \
            -X POST -H "x-deploy-secret: ${DEPLOY_SECRET}" \
            -H "Content-Type: text/plain" \
            --data-binary @/tmp/bigrock_dump.sql \
            "http://3.110.190.182/api/deploy-db-import" --max-time 60)
          echo "HTTP: $HTTP — $(cat /tmp/import_resp.txt)"
          [ "$HTTP" = "200" ] || (echo "FAIL: import returned $HTTP"; exit 1)

      - name: Upload dump as artifact (backup)
        uses: actions/upload-artifact@v4
        with:
          name: bigrock-mysql-dump
          path: /tmp/bigrock_dump.sql
          retention-days: 7
