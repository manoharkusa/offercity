name: Migrate BigRock MySQL to EC2

on:
  workflow_dispatch:
  push:
    branches: [migrate-db]

jobs:
  migrate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Write BigRock SSH key
        env:
          SSH_CI_KEY: ${{ secrets.SSH_CI_KEY }}
        run: |
          printf '%s\n' "$SSH_CI_KEY" > /tmp/br_key
          chmod 600 /tmp/br_key
          head -1 /tmp/br_key

      - name: Install paramiko
        run: pip install -q paramiko

      - name: Dump BigRock MySQL
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: python .github/scripts/dump_bigrock_db.py

      - name: Show dump stats
        run: |
          wc -l /tmp/bigrock_dump.sql
          grep "^INSERT INTO" /tmp/bigrock_dump.sql | sed "s/INSERT INTO \`\([^']*\)\`.*/\1/" | sort | uniq -c | sort -rn

      - name: Upload dump as artifact
        uses: actions/upload-artifact@v4
        with:
          name: bigrock-mysql-dump
          path: /tmp/bigrock_dump.sql
          retention-days: 1
