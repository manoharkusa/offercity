name: Deploy to BigRock (Staging)

on:
  push:
    branches: [staging]

env:
  STAGING_URL: http://staging.offerscity.co.in
  STAGING_IP: 192.185.129.210
  EC2_IP: 3.110.190.182

jobs:
  deploy:
    runs-on: ubuntu-latest
    outputs:
      deploy_ok: ${{ steps.deploy.outcome == 'success' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Build React app
        run: cd client && npm run build

      - name: Write SSH key
        run: |
          printf '%s\n' "$SSH_CI_KEY" > /tmp/ci_key
          chmod 600 /tmp/ci_key
        env:
          SSH_CI_KEY: ${{ secrets.SSH_CI_KEY }}

      - name: Install paramiko
        run: pip install paramiko

      - name: Deploy to cPanel via SSH/SFTP
        id: deploy
        env:
          SSH_HOST:          ${{ secrets.SSH_HOST }}
          SSH_USER:          ${{ secrets.SSH_USER }}
          SSH_KEY_PATH:      /tmp/ci_key
          GROQ_API_KEY:       ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          VAPID_PUBLIC_KEY:   ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY:  ${{ secrets.VAPID_PRIVATE_KEY }}
        run: python .github/scripts/deploy_ci.py

      - name: Upload node.log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-log
          path: /tmp/node.log
          if-no-files-found: ignore

  smoke-test:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Health check (EC2 production API)
        run: |
          HTTP=$(curl -sf -o /tmp/health.json -w "%{http_code}" \
            "http://${{ env.EC2_IP }}/api/health" --max-time 15 || echo "000")
          echo "HTTP: $HTTP — $(cat /tmp/health.json 2>/dev/null)"
          [ "$HTTP" = "200" ] || (echo "FAIL: health check returned $HTTP"; exit 1)

      - name: API — offers endpoint
        run: |
          HTTP=$(curl -sf -o /tmp/offers.json -w "%{http_code}" \
            "http://${{ env.EC2_IP }}/api/offers" --max-time 15 || echo "000")
          COUNT=$(cat /tmp/offers.json 2>/dev/null | python3 -c "import sys,json; print(len(json.load(sys.stdin)))" 2>/dev/null || echo 0)
          echo "HTTP: $HTTP — $COUNT offers"
          [ "$HTTP" = "200" ] || (echo "FAIL: offers endpoint returned $HTTP"; exit 1)

      - name: API — auth endpoint responds
        run: |
          HTTP=$(curl -s -o /tmp/auth.json -w "%{http_code}" \
            -X POST "http://${{ env.EC2_IP }}/api/auth/login" \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.com","password":"wrongpass"}' \
            --max-time 15 || echo "000")
          echo "HTTP: $HTTP — $(cat /tmp/auth.json 2>/dev/null)"
          [ "$HTTP" = "401" ] || [ "$HTTP" = "400" ] || (echo "FAIL: auth returned $HTTP"; exit 1)

      - name: Frontend — React app loads
        run: |
          HTTP=$(curl -sf -o /tmp/index.html -w "%{http_code}" \
            "http://${{ env.EC2_IP }}/" --max-time 15 || echo "000")
          TITLE=$(grep -o '<title>[^<]*</title>' /tmp/index.html 2>/dev/null | head -1 || echo "")
          echo "HTTP: $HTTP — $TITLE"
          [ "$HTTP" = "200" ] || (echo "FAIL: homepage returned $HTTP"; exit 1)

      - name: All smoke tests passed
        run: echo "EC2 API smoke tests passed — promoting staging to production"

  promote-to-production:
    runs-on: ubuntu-latest
    needs: smoke-test
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Merge staging into main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin
          git checkout main
          git merge origin/staging --no-edit -m "chore: promote staging to production [auto]"
          git push origin main
          echo "Promoted staging → main. EC2 deploy will trigger automatically."
