name: Deploy to Production

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install client dependencies
        run: cd client && npm ci

      - name: Build React app
        run: cd client && npm run build

      - name: Write SSH key
        run: |
          printf '%s\n' "$SSH_CI_KEY" > /tmp/ci_key
          chmod 600 /tmp/ci_key
        env:
          SSH_CI_KEY: ${{ secrets.SSH_CI_KEY }}

      - name: Install paramiko
        run: pip install paramiko

      - name: Deploy to cPanel via SSH/SFTP
        env:
          SSH_HOST:          ${{ secrets.SSH_HOST }}
          SSH_USER:          ${{ secrets.SSH_USER }}
          SSH_KEY_PATH:      /tmp/ci_key
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          VAPID_PUBLIC_KEY:  ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: python .github/scripts/deploy_ci.py

      - name: Upload node.log artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: node-log
          path: /tmp/node.log
          if-no-files-found: ignore
