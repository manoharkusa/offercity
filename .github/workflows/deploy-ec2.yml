name: Deploy to EC2 (Production)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Build React app
        run: cd client && npm ci && npm run build

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | base64 -d > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "${{ secrets.EC2_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null || true

      - name: Upload React dist to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "Uploading dist to EC2..."
          scp -i ~/.ssh/deploy_key -o StrictHostKeyChecking=no \
            -r client/dist/. \
            "ubuntu@${EC2_HOST}:/home/ubuntu/offercity/client/dist/"
          echo "Upload complete"

      - name: Trigger server restart via webhook
        env:
          DEPLOY_SECRET: ${{ secrets.DEPLOY_SECRET }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          HTTP_CODE=$(curl -s -o /tmp/resp.txt -w "%{http_code}" -X POST \
            -H "x-deploy-secret: ${DEPLOY_SECRET}" \
            -H "Content-Type: application/json" \
            "http://${EC2_HOST}/api/deploy-restart" \
            --max-time 15)
          echo "HTTP: $HTTP_CODE — $(cat /tmp/resp.txt)"
          [ "$HTTP_CODE" = "200" ] || exit 1

      - name: Wait for EC2 health check
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 30
          for i in $(seq 1 6); do
            STATUS=$(curl -sf "http://${EC2_HOST}/api/health" --max-time 10 2>/dev/null || echo "")
            if [ -n "$STATUS" ]; then
              echo "EC2 healthy: $STATUS"
              exit 0
            fi
            echo "  attempt $i — waiting 10s..."
            sleep 10
          done
          echo "WARNING: health check timed out"
          exit 1
