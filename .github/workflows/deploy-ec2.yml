name: Deploy to EC2 (Production)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Trigger deploy on EC2
        run: |
          echo "Calling EC2 deploy webhook..."
          RESPONSE=$(curl -sf -X POST \
            -H "x-deploy-secret: ${{ secrets.DEPLOY_SECRET }}" \
            -H "Content-Type: application/json" \
            http://${{ secrets.EC2_HOST }}/api/deploy-restart \
            --max-time 15 2>&1)
          echo "Response: $RESPONSE"
          echo "Deploy triggered — EC2 is pulling code and restarting (takes ~60s)"

      - name: Wait for EC2 to come back
        run: |
          echo "Waiting 75s for EC2 to restart..."
          sleep 75
          for i in $(seq 1 6); do
            STATUS=$(curl -sf http://${{ secrets.EC2_HOST }}/api/health --max-time 10 2>/dev/null || echo "")
            if [ -n "$STATUS" ]; then
              echo "EC2 is up: $STATUS"
              exit 0
            fi
            echo "  attempt $i — not ready yet, waiting 10s..."
            sleep 10
          done
          echo "WARNING: EC2 health check timed out — check PM2 logs"
          exit 1
