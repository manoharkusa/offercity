name: Deploy to EC2 (Production)

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install and build React
        run: cd client && npm ci && npm run build

      # 1. Pull latest server code on EC2
      - name: Pull server code on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/offercity
            git pull origin main
            cd server && npm ci --omit=dev

      # 2. Upload built React dist to EC2
      - name: Upload React dist to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "client/dist/"
          target: "/home/ubuntu/offercity/client/dist/"
          strip_components: 2

      # 3. Inject secrets into .env and restart
      - name: Inject secrets and restart
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: GROQ_API_KEY,ANTHROPIC_API_KEY,VAPID_PUBLIC_KEY,VAPID_PRIVATE_KEY
          script: |
            ENV_FILE=/home/ubuntu/offercity/server/.env

            update_env() {
              local key=$1 val=$2
              [ -z "$val" ] && return
              if grep -q "^${key}=" "$ENV_FILE" 2>/dev/null; then
                sed -i "s|^${key}=.*|${key}=${val}|" "$ENV_FILE"
              else
                echo "${key}=${val}" >> "$ENV_FILE"
              fi
            }

            update_env GROQ_API_KEY      "$GROQ_API_KEY"
            update_env ANTHROPIC_API_KEY "$ANTHROPIC_API_KEY"
            update_env VAPID_PUBLIC_KEY  "$VAPID_PUBLIC_KEY"
            update_env VAPID_PRIVATE_KEY "$VAPID_PRIVATE_KEY"

            pm2 restart offercity --update-env
            sleep 5
            curl -sf http://localhost:5008/api/health && echo "Deploy OK" || echo "WARNING: health check failed"
        env:
          GROQ_API_KEY:      ${{ secrets.GROQ_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          VAPID_PUBLIC_KEY:  ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
